name: Phase 0 Contract CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase0-contract:
    name: Windows Phase 0 contracts
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-1.95.0-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-1.95.0-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Test desktop bootstrap contract
        run: pnpm --dir apps/desktop test
        timeout-minutes: 5

      - name: Test and validate Phase 0 fixtures
        run: |
          pnpm phase0:fixtures:test
          pnpm phase0:fixtures:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 replay ledgers
        run: |
          pnpm phase0:ledgers:test
          pnpm phase0:ledgers:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 provider harness
        run: |
          pnpm phase0:provider:test
          pnpm phase0:provider:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 clock calibration
        run: |
          pnpm phase0:clock:test
          pnpm phase0:clock:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 queue and resource harness
        run: |
          pnpm phase0:resources:test
          pnpm phase0:resources:validate
        timeout-minutes: 5

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        timeout-minutes: 5

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
        timeout-minutes: 15

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --all-features --locked
        timeout-minutes: 15

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets --all-features --locked
        timeout-minutes: 15

      - name: Test Rust workspace in release mode
        run: cargo test --workspace --release --all-targets --all-features --locked
        timeout-minutes: 20

      - name: Typecheck desktop frontend
        run: pnpm desktop:typecheck
        timeout-minutes: 10

      - name: Build desktop frontend
        run: pnpm desktop:build
        timeout-minutes: 10

      - name: Build release desktop shell
        run: pnpm --dir apps/desktop tauri build --no-bundle
        timeout-minutes: 20
