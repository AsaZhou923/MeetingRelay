              [bool]$attestation.authority.production_evidence -ne $false) {
            throw "persisted quality-host source-build attestation identity drifted"
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_QUALITY_HOST_BUILD_ATTESTATION=$attestationPath" -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_QUALITY_HOST_BUILD_ATTESTATION_SHA256=$attestationSha256" -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_FORMAL_QUALITY_HOST_EXE=$formalQualityHost" -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_QUALITY_HOST_SHA256=$qualityHostSha256" -Encoding utf8
