      - name: Exercise actual Release quality-host private plaintext pipe
        shell: pwsh
        run: |
          $schemaRegistry = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-schema-registry.json'))
          $packageLock = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'Cargo.lock'))
          $referenceManifestPath = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-quality-smoke-reference.json'))
          $referenceManifest = Get-Content -Raw -LiteralPath $referenceManifestPath -Encoding utf8 | ConvertFrom-Json
          $wavBytes = [IO.File]::ReadAllBytes($env:MEETINGRELAY_SHERPA_WAV)
          if ($wavBytes.LongLength -ne [long]$referenceManifest.audio.file_bytes -or
              $wavBytes.Length -lt 44 -or
              [Text.Encoding]::ASCII.GetString($wavBytes, 0, 4) -cne 'RIFF' -or
              [Text.Encoding]::ASCII.GetString($wavBytes, 8, 4) -cne 'WAVE' -or
              [Text.Encoding]::ASCII.GetString($wavBytes, 36, 4) -cne 'data') {
            throw 'sealed quality-host WAV framing validation failed'
          }
          $dataBytes = [BitConverter]::ToUInt32($wavBytes, 40)
          if ($dataBytes -ne $wavBytes.Length - 44) {
            throw 'sealed quality-host WAV payload length validation failed'
          }
          $pcmBytes = [byte[]]::new($dataBytes)
          [Array]::Copy($wavBytes, 44, $pcmBytes, 0, $dataBytes)
          $wavSha256 = [Convert]::ToHexString([Security.Cryptography.SHA256]::HashData($wavBytes)).ToLowerInvariant()
          $pcmSha256 = [Convert]::ToHexString([Security.Cryptography.SHA256]::HashData($pcmBytes)).ToLowerInvariant()
          $qualityHostSha256 = (Get-FileHash -LiteralPath $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_QUALITY_HOST_EXE -Algorithm SHA256).Hash.ToLowerInvariant()
          $schemaRegistrySha256 = (Get-FileHash -LiteralPath $schemaRegistry -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($wavSha256 -cne [string]$referenceManifest.audio.sha256) {
            throw 'sealed quality-host WAV digest validation failed'
          }

          $startInfo = [Diagnostics.ProcessStartInfo]::new()
          $startInfo.FileName = $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_QUALITY_HOST_EXE
          $startInfo.UseShellExecute = $false
          $startInfo.CreateNoWindow = $true
          $startInfo.RedirectStandardOutput = $true
          $startInfo.RedirectStandardError = $true
          $startInfo.StandardOutputEncoding = [Text.UTF8Encoding]::new($false, $true)
          $startInfo.StandardErrorEncoding = [Text.UTF8Encoding]::new($false, $true)
          foreach ($argument in @(
            $schemaRegistry,
            $env:MEETINGRELAY_SHERPA_MODEL,
            $env:MEETINGRELAY_SHERPA_TOKENS,
            $env:SHERPA_ONNX_LIB_DIR,
            $env:MEETINGRELAY_SHERPA_LOCK,
            $packageLock,
            'sealed-zh-quality-smoke',
            'zh',
            $env:MEETINGRELAY_SHERPA_WAV,
            [string]$wavBytes.LongLength,
            $wavSha256,
            $pcmSha256,
            [string]$referenceManifest.transcript.sha256
          )) {
            [void]$startInfo.ArgumentList.Add([string]$argument)
          }
          $process = [Diagnostics.Process]::new()
          $process.StartInfo = $startInfo
          if (-not $process.Start()) {
            throw 'quality-host process did not start'
          }
          $privateStdout = $process.StandardOutput.ReadToEnd()
          $privateStderr = $process.StandardError.ReadToEnd()
          $process.WaitForExit()
          if ($process.ExitCode -ne 0 -or $privateStderr.Length -ne 0) {
            throw 'quality-host private-pipe execution failed'
          }
          if (-not $privateStdout.EndsWith("`n", [StringComparison]::Ordinal) -or
              $privateStdout.Contains("`r") -or
              $privateStdout.IndexOf("`n", [StringComparison]::Ordinal) -ne $privateStdout.Length - 1) {
            throw 'quality-host private-pipe framing failed'
          }
          try {
            $record = $privateStdout.Substring(0, $privateStdout.Length - 1) | ConvertFrom-Json -ErrorAction Stop
          } catch {
            throw 'quality-host private-pipe JSON validation failed'
          }
          $transcriptBytes = [Text.Encoding]::UTF8.GetBytes([string]$record.execution.final_transcript)
          $transcriptSha256 = [Convert]::ToHexString([Security.Cryptography.SHA256]::HashData($transcriptBytes)).ToLowerInvariant()
          if ([string]$record.kind -cne 'meetingrelay-native-candidate-quality-sample-v1' -or
              [string]$record.schema_version -cne '1.0' -or
              [string]$record.authority.formal_claims -cne 'none' -or
              [bool]$record.authority.production_evidence -ne $false -or
              [string]$record.candidate.candidate_id -cne 'sherpa-native-sensevoice-int8-2024-07-17-win-x64-cpu' -or
              [bool]$record.execution.fresh_process_per_sample -ne $true -or
              [string]$record.host.executable_sha256 -cne $qualityHostSha256 -or
              [string]$record.host.schema_registry_sha256 -cne $schemaRegistrySha256 -or
              [string]$record.sample.sample_id -cne 'sealed-zh-quality-smoke' -or
              [string]$record.sample.language -cne 'zh' -or
              [string]$record.sample.wav_sha256 -cne $wavSha256 -or
              [string]$record.sample.pcm_sha256 -cne $pcmSha256 -or
              [string]$record.sample.reference_sha256 -cne [string]$referenceManifest.transcript.sha256 -or
              [int]$record.execution.backend_execute_calls -ne 1 -or
              [string]$record.execution.final_transcript_utf8_bytes -cne [string]$transcriptBytes.LongLength -or
              [string]$record.execution.final_transcript_sha256 -cne $transcriptSha256) {
            throw 'quality-host private-pipe identity validation failed'
          }
          $privateStdout = $null
          $privateStderr = $null
          $record = $null
          $transcriptBytes = $null
          Write-Output "CANDIDATE_QUALITY_PRIVATE_PIPE=PASS executable_sha256=$qualityHostSha256 transcript_sha256=$transcriptSha256 formal_claims=none production_evidence=false"
        timeout-minutes: 10

