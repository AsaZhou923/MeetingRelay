name: Phase 0 Contract CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase0-contract:
    name: Windows Phase 0 contracts
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/debug
            target/release
          key: ${{ runner.os }}-rust-no-model-assets-v1-1.95.0-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'tools/sherpa-native/assets.lock.json', 'tools/sherpa-native/assets.lock.sha256') }}
          restore-keys: |
            ${{ runner.os }}-rust-no-model-assets-v1-1.95.0-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Fetch locked Rust dependencies before the offline build phase
        shell: pwsh
        run: |
          cargo fetch --locked
          if ($LASTEXITCODE -ne 0) { throw "cargo fetch --locked failed" }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value 'CARGO_NET_OFFLINE=true' -Encoding utf8
        timeout-minutes: 10

      - name: Test desktop bootstrap contract
        run: pnpm --dir apps/desktop test
        timeout-minutes: 5

      - name: Test and validate Phase 0 fixtures
        run: |
          pnpm phase0:fixtures:test
          pnpm phase0:fixtures:validate
        timeout-minutes: 5

      - name: Test and validate WP-0.4 candidate artifact contract
        run: |
          pnpm phase0:candidate-artifacts:test
          pnpm phase0:candidate-artifacts:validate
        timeout-minutes: 5

      - name: Test WP-0.4 measured HW-REF collector foundation
        run: pnpm phase0:hw-ref:test
        timeout-minutes: 5

      - name: Test and validate sherpa offline asset lock
        shell: pwsh
        run: |
          pnpm phase0:sherpa-assets:test
          pnpm phase0:sherpa-assets:validate
          pnpm phase0:sherpa-provenance:test
        timeout-minutes: 5

      - name: Test WP-0.4 sherpa candidate-input pure planner
        run: pnpm phase0:sherpa-candidate-plan:test
        timeout-minutes: 5

      - name: Test WP-0.4 sherpa candidate-input sealed bundle plan
        run: pnpm phase0:sherpa-candidate-bundle-plan:test
        timeout-minutes: 5

      - name: Test WP-0.4 measured-HW candidate-input closeout
        run: pnpm phase0:sherpa-candidate-measured-closeout:test
        timeout-minutes: 5

      - name: Test WP-0.4 native candidate conformance contract
        run: pnpm phase0:sherpa-candidate-conformance:test
        timeout-minutes: 5

      - name: Test WP-0.4 native exact-match quality-smoke evidence contract
        run: pnpm phase0:sherpa-candidate-quality-smoke:test
        timeout-minutes: 5

      - name: Test WP-0.4 native fatal-process evidence contract
        run: pnpm phase0:sherpa-candidate-fault-evidence:test
        timeout-minutes: 5

      - name: Test and validate Phase 0 replay ledgers
        run: |
          pnpm phase0:ledgers:test
          pnpm phase0:ledgers:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 provider harness
        run: |
          pnpm phase0:provider:test
          pnpm phase0:provider:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 clock calibration
        run: |
          pnpm phase0:clock:test
          pnpm phase0:clock:validate
        timeout-minutes: 5

      - name: Test and validate Phase 0 queue and resource harness
        run: |
          pnpm phase0:resources:test
          pnpm phase0:resources:validate
        timeout-minutes: 5

      - name: Materialize pinned sherpa runtime and model assets
        shell: pwsh
        run: |
          $gitCommands = @(Get-Command git.exe -CommandType Application -All -ErrorAction Stop)
          $resolvedGitRoots = foreach ($gitCommand in $gitCommands) {
            $directory = [IO.DirectoryInfo](Split-Path -Parent ([IO.Path]::GetFullPath($gitCommand.Source)))
            $resolvedGitRoot = $null
            while ($null -ne $directory) {
              $tarCandidate = Join-Path $directory.FullName 'usr\bin\tar.exe'
              $bzip2Candidate = Join-Path $directory.FullName 'usr\bin\bzip2.exe'
              if ((Test-Path -LiteralPath $tarCandidate -PathType Leaf) -and
                  (Test-Path -LiteralPath $bzip2Candidate -PathType Leaf)) {
                $resolvedGitRoot = [IO.Path]::GetFullPath($directory.FullName)
                break
              }
              $directory = $directory.Parent
            }
            if ($null -eq $resolvedGitRoot) {
              throw "PATH-visible git.exe is not inside a complete Git for Windows installation: $($gitCommand.Source)"
            }
            $resolvedGitRoot
          }
          $gitRoots = @($resolvedGitRoots | Sort-Object -Unique)
          if ($gitRoots.Count -ne 1) { throw "expected exactly one Git for Windows installation root" }
          $gitRoot = $gitRoots[0]
          Write-Host "MEETINGRELAY_GIT_ROOT=$gitRoot visible_git_executables=$($gitCommands.Count)"
          $archiveTar = Join-Path $gitRoot 'usr\bin\tar.exe'
          $archiveBzip2 = Join-Path $gitRoot 'usr\bin\bzip2.exe'
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_ARCHIVE_TAR=$archiveTar" -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_ARCHIVE_BZIP2=$archiveBzip2" -Encoding utf8
          & ./tools/sherpa-native/materialize.ps1 `
            -CacheRoot target/sherpa-native `
            -AssetSet All `
            -ArchiveTarPath $archiveTar `
            -ArchiveBzip2Path $archiveBzip2 `
            -AllowDownload
          if ($LASTEXITCODE -ne 0) { throw "online sherpa materialization failed" }
          $second = & ./tools/sherpa-native/materialize.ps1 `
            -CacheRoot target/sherpa-native `
            -AssetSet All `
            -ArchiveTarPath $archiveTar `
            -ArchiveBzip2Path $archiveBzip2
          $second | Write-Output
          $keys = @(
            'MEETINGRELAY_SHERPA_LOCK',
            'MEETINGRELAY_SHERPA_LOCK_SHA256',
            'MEETINGRELAY_SHERPA_PARAMETER_SHA256',
            'MEETINGRELAY_SHERPA_MODEL',
            'MEETINGRELAY_SHERPA_MODEL_SHA256',
            'MEETINGRELAY_SHERPA_TOKENS',
            'MEETINGRELAY_SHERPA_TOKENS_SHA256',
            'MEETINGRELAY_SHERPA_WAV',
            'SHERPA_ONNX_LIB_DIR'
          )
          foreach ($key in $keys) {
            $matches = @($second | Where-Object { $_ -like "$key=*" })
            if ($matches.Count -ne 1) { throw "materializer did not emit exactly one $key" }
            Add-Content -LiteralPath $env:GITHUB_ENV -Value $matches[0] -Encoding utf8
          }
        timeout-minutes: 25

      - name: Test sherpa path hardening against materialized assets
        shell: pwsh
        run: |
          $output = @(& ./tools/sherpa-native/path-hardening.test.ps1 `
            -ArchiveTarPath $env:MEETINGRELAY_ARCHIVE_TAR `
            -ArchiveBzip2Path $env:MEETINGRELAY_ARCHIVE_BZIP2 `
            2>&1)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "sherpa path-hardening tests failed" }
          if (@($output | Where-Object { [string]$_ -match '=SKIP' }).Count -ne 0) {
            throw "sherpa path-hardening tests must not skip on the Windows CI runner"
          }
          $required = @(
            'MATERIALIZE_JUNCTION_REGRESSION=PASS',
            'STAGE_JUNCTION_REGRESSION=PASS',
            'STAGE_DESTINATION_JUNCTION_REGRESSION=PASS',
            'STAGE_EQUAL_OVERLAP_REGRESSION=PASS',
            'STAGE_DESCENDANT_OVERLAP_REGRESSION=PASS',
            'STAGE_ANCESTOR_OVERLAP_REGRESSION=PASS',
            'ARCHIVE_HARDLINK_REGRESSION=PASS'
          )
          foreach ($expected in $required) {
            if (@($output | Where-Object { [string]$_ -eq $expected }).Count -ne 1) {
              throw "Missing unique path-hardening result: $expected"
            }
          }
        timeout-minutes: 5

      - name: Stage pinned sherpa DLLs beside Windows test executables
        shell: pwsh
        run: |
          ./tools/sherpa-native/stage-runtime.ps1 `
            -LibDir $env:SHERPA_ONNX_LIB_DIR `
            -Configuration All
        timeout-minutes: 5

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        timeout-minutes: 5

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets --all-features --offline --locked -- -D warnings
        timeout-minutes: 15

      - name: Lint and test sherpa adapter without the native feature
        run: |
          cargo clippy -p meetingrelay-model-worker-sherpa-native --all-targets --no-default-features --offline --locked -- -D warnings
          cargo test -p meetingrelay-model-worker-sherpa-native --all-targets --no-default-features --offline --locked
        timeout-minutes: 10

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --all-features --offline --locked
        timeout-minutes: 15

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets --all-features --offline --locked
        timeout-minutes: 15

      - name: Build exact Debug and Release sherpa smoke executables
        shell: pwsh
        run: |
          function Build-SmokeExecutable {
            param([switch]$Release)
            $profileArguments = if ($Release) { @('--release') } else { @() }
            $cargoArguments = @(
              'test'
            ) + $profileArguments + @(
              '-p', 'meetingrelay-model-worker-sherpa-native',
              '--features', 'native-sherpa',
              '--test', 'native_sherpa_smoke',
              '--no-run',
              '--message-format=json',
              '--offline',
              '--locked'
            )
            $messages = @(& cargo @cargoArguments | ForEach-Object { $_ | ConvertFrom-Json })
            if ($LASTEXITCODE -ne 0) { throw "cargo failed to build the native smoke executable" }
            $executables = @($messages |
              Where-Object {
                $_.reason -eq 'compiler-artifact' -and
                $_.target.name -eq 'native_sherpa_smoke' -and
                $_.profile.test -and
                -not [string]::IsNullOrWhiteSpace([string]$_.executable)
              } |
              ForEach-Object { [IO.Path]::GetFullPath([string]$_.executable) } |
              Sort-Object -Unique)
            if ($executables.Count -ne 1) {
              throw "Expected exactly one native smoke executable, got $($executables.Count)"
            }
            if (-not (Test-Path -LiteralPath $executables[0] -PathType Leaf)) {
              throw "Cargo-reported native smoke executable does not exist: $($executables[0])"
            }
            return $executables[0]
          }

          $debugExecutable = Build-SmokeExecutable
          $releaseExecutable = Build-SmokeExecutable -Release
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_SHERPA_DEBUG_SMOKE_EXE=$debugExecutable" -Encoding utf8
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_SHERPA_RELEASE_SMOKE_EXE=$releaseExecutable" -Encoding utf8
        timeout-minutes: 20

      - name: Audit pinned runtime inventory and PE dependencies
        shell: pwsh
        run: |
          ./tools/sherpa-native/audit-pe-dependencies.ps1 -ParserSelfTest
          ./tools/sherpa-native/audit-pe-dependencies.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -BinaryPath @(
              $env:MEETINGRELAY_SHERPA_DEBUG_SMOKE_EXE,
              $env:MEETINGRELAY_SHERPA_RELEASE_SMOKE_EXE
            )
        timeout-minutes: 5

      - name: Probe loaded modules and run real Debug sherpa smoke
        shell: pwsh
        run: |
          ./tools/sherpa-native/probe-loaded-runtime.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -TestExecutable $env:MEETINGRELAY_SHERPA_DEBUG_SMOKE_EXE `
            -Configuration Debug
        timeout-minutes: 10

      - name: Test Rust workspace in release mode
        run: cargo test --workspace --release --all-targets --all-features --offline --locked
        timeout-minutes: 20

      - name: Probe loaded modules and run real Release sherpa smoke
        shell: pwsh
        run: |
          ./tools/sherpa-native/probe-loaded-runtime.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -TestExecutable $env:MEETINGRELAY_SHERPA_RELEASE_SMOKE_EXE `
            -Configuration Release
        timeout-minutes: 10

      - name: Build exact Release candidate-host executable
        shell: pwsh
        run: |
          $metadata = & cargo metadata --format-version 1 --no-deps --offline --locked | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw "cargo metadata failed for candidate-host selection" }
          $packageIds = @($metadata.packages |
            Where-Object { $_.name -eq 'meetingrelay-model-worker-sherpa-native' } |
            ForEach-Object { [string]$_.id } |
            Sort-Object -Unique)
          if ($packageIds.Count -ne 1) {
            throw "Expected exactly one sherpa-native package ID, got $($packageIds.Count)"
          }
          $packageId = $packageIds[0]
          $targetRoot = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target'))
          $rustcVersion = @(& rustc -vV)
          if ($LASTEXITCODE -ne 0) { throw "rustc -vV failed for candidate-host target validation" }
          $hostLines = @($rustcVersion | Where-Object { [string]$_ -like 'host: *' })
          if ($hostLines.Count -ne 1 -or [string]$hostLines[0] -cne 'host: x86_64-pc-windows-msvc') {
            throw "candidate host requires the x86_64-pc-windows-msvc Rust host triple"
          }

          function Assert-CargoCandidateHostPath {
            param(
              [Parameter(Mandatory = $true)][string]$Executable
            )
            $resolved = [IO.Path]::GetFullPath($Executable)
            $prefix = $targetRoot.TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
            if (-not $resolved.StartsWith($prefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw "Cargo-reported candidate host is outside the repository target directory"
            }
            if ((Split-Path -Leaf $resolved) -cne 'meetingrelay-sherpa-candidate-host.exe' -or
                (Split-Path -Leaf (Split-Path -Parent $resolved)) -cne 'release' -or
                [IO.Path]::GetFullPath((Split-Path -Parent (Split-Path -Parent $resolved))) -ne $targetRoot) {
              throw "Cargo-reported candidate host has an unexpected target or profile path"
            }
            $current = $resolved
            while ($null -ne $current) {
              $attributes = [IO.File]::GetAttributes($current)
              if (($attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                throw "Cargo-reported candidate host path contains a reparse point"
              }
              $parent = [IO.Directory]::GetParent($current)
              $current = if ($null -eq $parent) { $null } else { $parent.FullName }
            }
            if (-not (Test-Path -LiteralPath $resolved -PathType Leaf)) {
              throw "Cargo-reported candidate host does not exist"
            }
            return $resolved
          }

          function Build-CandidateHostExecutable {
            $cargoArguments = @(
              'build', '--release',
              '-p', 'meetingrelay-model-worker-sherpa-native',
              '--features', 'native-sherpa',
              '--bin', 'meetingrelay-sherpa-candidate-host',
              '--message-format=json',
              '--offline',
              '--locked'
            )
            $messages = @(& cargo @cargoArguments | ForEach-Object { $_ | ConvertFrom-Json })
            if ($LASTEXITCODE -ne 0) { throw "cargo failed to build the candidate host" }
            $executables = @($messages |
              Where-Object {
                $_.reason -eq 'compiler-artifact' -and
                [string]$_.package_id -eq $packageId -and
                $_.target.name -eq 'meetingrelay-sherpa-candidate-host' -and
                @($_.target.kind).Count -eq 1 -and
                [string]$_.target.kind[0] -eq 'bin' -and
                -not [bool]$_.target.test -and
                -not [bool]$_.profile.test -and
                -not [bool]$_.profile.debug_assertions -and
                [string]$_.profile.opt_level -ne '0' -and
                -not [string]::IsNullOrWhiteSpace([string]$_.executable)
              } |
              ForEach-Object { [IO.Path]::GetFullPath([string]$_.executable) } |
              Sort-Object -Unique)
            if ($executables.Count -ne 1) {
              throw "Expected exactly one Cargo-reported candidate host, got $($executables.Count)"
            }
            return Assert-CargoCandidateHostPath -Executable $executables[0]
          }

          $releaseExecutable = Build-CandidateHostExecutable
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_HOST_EXE=$releaseExecutable" -Encoding utf8
        timeout-minutes: 20

      - name: Audit provenance-only candidate-host PE dependencies
        shell: pwsh
        run: |
          ./tools/sherpa-native/audit-pe-dependencies.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -ProvenanceBinaryPath $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_HOST_EXE
        timeout-minutes: 5

      - name: Validate actual Release candidate-host provenance
        shell: pwsh
        run: |
          foreach ($name in @(
            'MEETINGRELAY_SHERPA_LOCK',
            'MEETINGRELAY_SHERPA_LOCK_SHA256',
            'MEETINGRELAY_SHERPA_PARAMETER_SHA256',
            'MEETINGRELAY_SHERPA_MODEL',
            'MEETINGRELAY_SHERPA_MODEL_SHA256',
            'MEETINGRELAY_SHERPA_TOKENS',
            'MEETINGRELAY_SHERPA_TOKENS_SHA256',
            'MEETINGRELAY_SHERPA_WAV',
            'SHERPA_ONNX_LIB_DIR'
          )) {
            Remove-Item -LiteralPath "Env:$name" -ErrorAction SilentlyContinue
          }
          $schemaRegistry = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-schema-registry.json'))
          $output = @(& node ./tools/sherpa-native/validate-worker-provenance.mjs `
            $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_HOST_EXE `
            $schemaRegistry)
          if ($LASTEXITCODE -ne 0) { throw "actual Release candidate-host provenance validation failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^candidate-host-provenance=verified worker_id=meetingrelay-sherpa-native-candidate-host-v1 executable_sha256=[0-9a-f]{64} executable_size_bytes=[1-9][0-9]* schema_registry_sha256=[0-9a-f]{64}$'
          })
          if ($marker.Count -ne 1) {
            throw "actual Release candidate-host provenance marker is missing or duplicated"
          }
        timeout-minutes: 10

      - name: Build exact Release candidate execution-host executable
        shell: pwsh
        run: |
          $metadata = & cargo metadata --format-version 1 --no-deps --offline --locked | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw "cargo metadata failed for candidate execution-host selection" }
          $packageIds = @($metadata.packages |
            Where-Object { $_.name -eq 'meetingrelay-model-worker-sherpa-native' } |
            ForEach-Object { [string]$_.id } |
            Sort-Object -Unique)
          if ($packageIds.Count -ne 1) {
            throw "Expected exactly one sherpa-native package ID, got $($packageIds.Count)"
          }
          $packageId = $packageIds[0]
          $targetRoot = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target'))
          $rustcVersion = @(& rustc -vV)
          if ($LASTEXITCODE -ne 0) { throw "rustc -vV failed for candidate execution-host target validation" }
          $hostLines = @($rustcVersion | Where-Object { [string]$_ -like 'host: *' })
          if ($hostLines.Count -ne 1 -or [string]$hostLines[0] -cne 'host: x86_64-pc-windows-msvc') {
            throw "candidate execution host requires the x86_64-pc-windows-msvc Rust host triple"
          }

          $cargoArguments = @(
            'build', '--release',
            '-p', 'meetingrelay-model-worker-sherpa-native',
            '--features', 'native-sherpa',
            '--bin', 'meetingrelay-sherpa-candidate-execution-host',
            '--message-format=json',
            '--offline',
            '--locked'
          )
          $messages = @(& cargo @cargoArguments | ForEach-Object { $_ | ConvertFrom-Json })
          if ($LASTEXITCODE -ne 0) { throw "cargo failed to build the candidate execution host" }
          $executables = @($messages |
            Where-Object {
              $_.reason -eq 'compiler-artifact' -and
              [string]$_.package_id -eq $packageId -and
              $_.target.name -eq 'meetingrelay-sherpa-candidate-execution-host' -and
              @($_.target.kind).Count -eq 1 -and
              [string]$_.target.kind[0] -eq 'bin' -and
              -not [bool]$_.target.test -and
              -not [bool]$_.profile.test -and
              -not [bool]$_.profile.debug_assertions -and
              [string]$_.profile.opt_level -ne '0' -and
              -not [string]::IsNullOrWhiteSpace([string]$_.executable)
            } |
            ForEach-Object { [IO.Path]::GetFullPath([string]$_.executable) } |
            Sort-Object -Unique)
          if ($executables.Count -ne 1) {
            throw "Expected exactly one Cargo-reported candidate execution host, got $($executables.Count)"
          }
          $releaseExecutable = $executables[0]
          $targetPrefix = $targetRoot.TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          if (-not $releaseExecutable.StartsWith($targetPrefix, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Cargo-reported candidate execution host is outside the repository target directory"
          }
          if ((Split-Path -Leaf $releaseExecutable) -cne 'meetingrelay-sherpa-candidate-execution-host.exe' -or
              (Split-Path -Leaf (Split-Path -Parent $releaseExecutable)) -cne 'release' -or
              [IO.Path]::GetFullPath((Split-Path -Parent (Split-Path -Parent $releaseExecutable))) -ne $targetRoot) {
            throw "Cargo-reported candidate execution host has an unexpected target or profile path"
          }
          $current = $releaseExecutable
          while ($null -ne $current) {
            $attributes = [IO.File]::GetAttributes($current)
            if (($attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
              throw "Cargo-reported candidate execution host path contains a reparse point"
            }
            $parent = [IO.Directory]::GetParent($current)
            $current = if ($null -eq $parent) { $null } else { $parent.FullName }
          }
          if (-not (Test-Path -LiteralPath $releaseExecutable -PathType Leaf)) {
            throw "Cargo-reported candidate execution host does not exist"
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_EXECUTION_HOST_EXE=$releaseExecutable" -Encoding utf8
        timeout-minutes: 20

      - name: Audit Release candidate execution-host PE dependencies
        shell: pwsh
        run: |
          $output = @(./tools/sherpa-native/audit-pe-dependencies.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -ExecutionHostBinaryPath $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_EXECUTION_HOST_EXE)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "candidate execution-host PE dependency audit failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^PE_EXECUTION_HOST_DEPENDENCY_AUDIT=PASS binary=.+\\target\\release\\meetingrelay-sherpa-candidate-execution-host\.exe imports=.*sherpa-onnx-c-api\.dll.*$'
          })
          if ($marker.Count -ne 1) {
            throw "candidate execution-host PE dependency audit marker is missing or duplicated"
          }
        timeout-minutes: 5

      - name: Probe actual Release candidate execution-host loaded modules
        shell: pwsh
        run: |
          $schemaRegistry = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-schema-registry.json'))
          $packageLock = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'Cargo.lock'))
          $output = @(./tools/sherpa-native/probe-loaded-runtime.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -ExecutionHostExecutable $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_EXECUTION_HOST_EXE `
            -SchemaRegistryPath $schemaRegistry `
            -ModelPath $env:MEETINGRELAY_SHERPA_MODEL `
            -TokensPath $env:MEETINGRELAY_SHERPA_TOKENS `
            -AssetLockPath $env:MEETINGRELAY_SHERPA_LOCK `
            -PackageLockPath $packageLock `
            -WavPath $env:MEETINGRELAY_SHERPA_WAV)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "candidate execution-host loaded-module probe failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^CANDIDATE_EXECUTION_LOADED_RUNTIME_MODULES=PASS executable=.+\\target\\release\\meetingrelay-sherpa-candidate-execution-host\.exe modules=.*onnxruntime\.dll.*sherpa-onnx-c-api\.dll.*$'
          })
          if ($marker.Count -ne 1) {
            throw "candidate execution-host loaded-module marker is missing or duplicated"
          }
        timeout-minutes: 10

      - name: Run actual locked-assets Release candidate conformance
        shell: pwsh
        run: |
          $schemaRegistry = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-schema-registry.json'))
          $packageLock = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'Cargo.lock'))
          $output = @(& node ./tools/sherpa-native/validate-candidate-conformance.mjs `
            $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_EXECUTION_HOST_EXE `
            $schemaRegistry `
            $env:MEETINGRELAY_SHERPA_MODEL `
            $env:MEETINGRELAY_SHERPA_TOKENS `
            $env:SHERPA_ONNX_LIB_DIR `
            $env:MEETINGRELAY_SHERPA_LOCK `
            $packageLock `
            $env:MEETINGRELAY_SHERPA_WAV)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "actual locked-assets Release candidate conformance failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^candidate-native-conformance=verified worker_id=meetingrelay-sherpa-native-candidate-host-v1 executable_sha256=[0-9a-f]{64} schema_registry_sha256=[0-9a-f]{64} final_transcript_sha256=[0-9a-f]{64} formal_claims=none production_evidence=false$'
          })
          if ($marker.Count -ne 1) {
            throw "actual locked-assets Release candidate conformance marker is missing or duplicated"
          }
        timeout-minutes: 10

      - name: Run actual sealed-reference native exact-match quality smoke
        shell: pwsh
        run: |
          $schemaRegistry = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-schema-registry.json'))
          $packageLock = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'Cargo.lock'))
          $evidencePath = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target/sherpa-native/native-candidate-quality-smoke-evidence.json'))
          if (Test-Path -LiteralPath $evidencePath) {
            throw "refusing to replace an existing native candidate quality-smoke evidence file"
          }
          $output = @(& pnpm phase0:sherpa-candidate-quality-smoke:run `
            $evidencePath `
            $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_EXECUTION_HOST_EXE `
            $schemaRegistry `
            $env:MEETINGRELAY_SHERPA_MODEL `
            $env:MEETINGRELAY_SHERPA_TOKENS `
            $env:SHERPA_ONNX_LIB_DIR `
            $env:MEETINGRELAY_SHERPA_LOCK `
            $packageLock `
            $env:MEETINGRELAY_SHERPA_WAV)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "actual native candidate quality-smoke evidence run failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^candidate-native-quality-smoke-evidence=verified evidence_sha256=[0-9a-f]{64} locked_input_snapshot_sha256=[0-9a-f]{64} runs=2 quality_gate_status=not-assessed redistribution_status=unresolved formal_claims=none production_evidence=false$'
          })
          if ($marker.Count -ne 1) {
            throw "actual native candidate quality-smoke evidence marker is missing or duplicated"
          }

          $validation = @(& pnpm phase0:sherpa-candidate-quality-smoke:validate $evidencePath)
          $validation | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "persisted native candidate quality-smoke evidence failed strict validation" }
          $validationMarker = @($validation | Where-Object {
            [string]$_ -match '^candidate-native-quality-smoke-evidence-file=verified evidence_sha256=[0-9a-f]{64} locked_input_snapshot_sha256=[0-9a-f]{64} runs=2 quality_gate_status=not-assessed redistribution_status=unresolved formal_claims=none production_evidence=false$'
          })
          if ($validationMarker.Count -ne 1) {
            throw "persisted native candidate quality-smoke validation marker is missing or duplicated"
          }
          if (@(git status --porcelain=v1 -- Cargo.lock).Count -ne 0) {
            throw "native quality-smoke evidence changed Cargo.lock"
          }
        timeout-minutes: 15

      - name: Clean native quality-smoke evidence state
        if: always()
        shell: pwsh
        run: |
          $repositoryTargetRoot = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target'))
          $targetPrefix = $repositoryTargetRoot.TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          $evidencePath = [IO.Path]::GetFullPath((Join-Path $repositoryTargetRoot 'sherpa-native/native-candidate-quality-smoke-evidence.json'))
          $evidenceParent = Split-Path -Parent $evidencePath
          $stagingCandidates = @(
            Get-ChildItem -LiteralPath $evidenceParent -Force -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -cmatch '^\.native-candidate-quality-smoke-evidence\.json\.[0-9a-f]{32}\.staging$' } |
              ForEach-Object { [IO.Path]::GetFullPath($_.FullName) }
          )
          foreach ($candidate in @($evidencePath) + $stagingCandidates) {
            if (-not $candidate.StartsWith($targetPrefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw "native quality-smoke cleanup target escaped the repository target directory"
            }
            $current = $candidate
            while ($true) {
              if (Test-Path -LiteralPath $current) {
                $attributes = [IO.File]::GetAttributes($current)
                if (($attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                  throw "native quality-smoke cleanup path contains a reparse point: $current"
                }
              }
              if ($current.Equals($repositoryTargetRoot, [StringComparison]::OrdinalIgnoreCase)) { break }
              $parent = [IO.Directory]::GetParent($current)
              if ($null -eq $parent) { throw "native quality-smoke cleanup path did not reach the repository target root" }
              $current = $parent.FullName
            }
            if (Test-Path -LiteralPath $candidate) {
              Remove-Item -LiteralPath $candidate -Force
            }
            if (Test-Path -LiteralPath $candidate) {
              throw "native quality-smoke cleanup left state behind: $candidate"
            }
          }
        timeout-minutes: 5

      - name: Build exact Release candidate fault-host executable
        shell: pwsh
        run: |
          $repositoryTargetRoot = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target'))
          $fatalFixtureRoot = [IO.Path]::GetFullPath((Join-Path $repositoryTargetRoot 'sherpa-native/fatal-fixtures'))
          $targetPrefix = $repositoryTargetRoot.TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          if (-not $fatalFixtureRoot.StartsWith($targetPrefix, [StringComparison]::OrdinalIgnoreCase)) {
            throw "fatal fixture root escaped the repository target directory"
          }
          $current = $fatalFixtureRoot
          while ($true) {
            if (Test-Path -LiteralPath $current) {
              $attributes = [IO.File]::GetAttributes($current)
              if (($attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                throw "fatal fixture cleanup path contains a reparse point: $current"
              }
            }
            if ($current.Equals($repositoryTargetRoot, [StringComparison]::OrdinalIgnoreCase)) { break }
            $parent = [IO.Directory]::GetParent($current)
            if ($null -eq $parent) { throw "fatal fixture cleanup path did not reach the repository target root" }
            $current = $parent.FullName
          }
          if (Test-Path -LiteralPath $fatalFixtureRoot) {
            Remove-Item -LiteralPath $fatalFixtureRoot -Recurse -Force
          }

          $rustTargetRoot = [IO.Path]::GetFullPath((Join-Path $fatalFixtureRoot 'rust-target'))
          $metadata = & cargo metadata --format-version 1 --no-deps --offline --locked | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw "cargo metadata failed for candidate fault-host selection" }
          $packageIds = @($metadata.packages |
            Where-Object { $_.name -eq 'meetingrelay-model-worker-sherpa-native' } |
            ForEach-Object { [string]$_.id } |
            Sort-Object -Unique)
          if ($packageIds.Count -ne 1) {
            throw "Expected exactly one sherpa-native package ID, got $($packageIds.Count)"
          }

          $rustcVersion = @(& rustc -vV)
          if ($LASTEXITCODE -ne 0) { throw "rustc -vV failed for candidate fault-host target validation" }
          $hostLines = @($rustcVersion | Where-Object { [string]$_ -like 'host: *' })
          if ($hostLines.Count -ne 1 -or [string]$hostLines[0] -cne 'host: x86_64-pc-windows-msvc') {
            throw "candidate fault host requires the x86_64-pc-windows-msvc Rust host triple"
          }

          $env:CARGO_TARGET_DIR = $rustTargetRoot
          $cargoArguments = @(
            'build', '--release',
            '-p', 'meetingrelay-model-worker-sherpa-native',
            '--features', 'native-sherpa,native-fault-fixture',
            '--bin', 'meetingrelay-sherpa-candidate-fault-host',
            '--message-format=json',
            '--offline',
            '--locked'
          )
          $messages = @(& cargo @cargoArguments | ForEach-Object { $_ | ConvertFrom-Json })
          if ($LASTEXITCODE -ne 0) { throw "cargo failed to build the candidate fault host" }
          $executables = @($messages |
            Where-Object {
              $_.reason -eq 'compiler-artifact' -and
              [string]$_.package_id -eq $packageIds[0] -and
              $_.target.name -eq 'meetingrelay-sherpa-candidate-fault-host' -and
              @($_.target.kind).Count -eq 1 -and
              [string]$_.target.kind[0] -eq 'bin' -and
              -not [bool]$_.target.test -and
              -not [bool]$_.profile.test -and
              -not [bool]$_.profile.debug_assertions -and
              [string]$_.profile.opt_level -ne '0' -and
              -not [string]::IsNullOrWhiteSpace([string]$_.executable)
            } |
            ForEach-Object { [IO.Path]::GetFullPath([string]$_.executable) } |
            Sort-Object -Unique)
          if ($executables.Count -ne 1) {
            throw "Expected exactly one Cargo-reported candidate fault host, got $($executables.Count)"
          }
          $releaseExecutable = $executables[0]
          $expectedExecutable = [IO.Path]::GetFullPath((Join-Path $rustTargetRoot 'release/meetingrelay-sherpa-candidate-fault-host.exe'))
          if (-not $releaseExecutable.Equals($expectedExecutable, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Cargo-reported candidate fault host has an unexpected target or profile path"
          }
          $current = $releaseExecutable
          while ($null -ne $current) {
            $attributes = [IO.File]::GetAttributes($current)
            if (($attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
              throw "Cargo-reported candidate fault-host path contains a reparse point"
            }
            if ($current.Equals($repositoryTargetRoot, [StringComparison]::OrdinalIgnoreCase)) { break }
            $parent = [IO.Directory]::GetParent($current)
            $current = if ($null -eq $parent) { $null } else { $parent.FullName }
          }
          if (-not (Test-Path -LiteralPath $releaseExecutable -PathType Leaf)) {
            throw "Cargo-reported candidate fault host does not exist"
          }
          ./tools/sherpa-native/stage-runtime.ps1 `
            -LibDir $env:SHERPA_ONNX_LIB_DIR `
            -Configuration Release `
            -DestinationRoot (Split-Path -Parent $releaseExecutable)
          if ($LASTEXITCODE -ne 0) { throw "candidate fault-host runtime staging failed" }
          if (@(git status --porcelain=v1 -- Cargo.lock).Count -ne 0) {
            throw "candidate fault-host build changed Cargo.lock"
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_FAULT_HOST_EXE=$releaseExecutable" -Encoding utf8
        timeout-minutes: 20

      - name: Audit Release candidate fault-host PE dependencies
        shell: pwsh
        run: |
          $output = @(./tools/sherpa-native/audit-pe-dependencies.ps1 `
            -RuntimeDir $env:SHERPA_ONNX_LIB_DIR `
            -BinaryPath $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_FAULT_HOST_EXE)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "candidate fault-host PE dependency audit failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^PE_DEPENDENCY_AUDIT=PASS binary=.+\\target\\sherpa-native\\fatal-fixtures\\rust-target\\release\\meetingrelay-sherpa-candidate-fault-host\.exe imports=.*sherpa-onnx-c-api\.dll.*$'
          })
          if ($marker.Count -ne 1) {
            throw "candidate fault-host PE dependency audit marker is missing or duplicated"
          }
        timeout-minutes: 5

      - name: Build and test exact MSVC native fatal-boundary fixture
        shell: pwsh
        run: |
          $output = @(& ./tools/sherpa-native/native-fatal-boundary-fixture-build.test.ps1)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "native fatal-boundary fixture build/test failed" }
          $marker = @($output | Where-Object {
            [string]$_ -ceq 'NATIVE_FATAL_BOUNDARY_FIXTURE_TEST=PASS'
          })
          if ($marker.Count -ne 1) {
            throw "native fatal-boundary fixture test marker is missing or duplicated"
          }
          $fixture = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target/sherpa-native/fatal-fixtures/msvc/meetingrelay-native-fatal-boundary-fixture.exe'))
          $metadata = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target/sherpa-native/fatal-fixtures/msvc/meetingrelay-native-fatal-boundary-fixture.build.json'))
          foreach ($path in @($fixture, $metadata)) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "native fatal-boundary fixture build output is missing: $path"
            }
            $attributes = [IO.File]::GetAttributes($path)
            if (($attributes -band ([IO.FileAttributes]::Directory -bor [IO.FileAttributes]::ReparsePoint)) -ne 0) {
              throw "native fatal-boundary fixture build output is not a regular non-reparse file: $path"
            }
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "MEETINGRELAY_NATIVE_FATAL_BOUNDARY_FIXTURE_EXE=$fixture" -Encoding utf8
        timeout-minutes: 10

      - name: Run actual native fatal-process containment and fresh-host recovery evidence
        shell: pwsh
        run: |
          $schemaRegistry = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'tools/sherpa-native/candidate-schema-registry.json'))
          $packageLock = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'Cargo.lock'))
          $evidencePath = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target/sherpa-native/native-candidate-fault-evidence.json'))
          if (Test-Path -LiteralPath $evidencePath) {
            throw "refusing to replace an existing native candidate fault-evidence file"
          }
          $output = @(& pnpm phase0:sherpa-candidate-fault-evidence:run `
            $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_FAULT_HOST_EXE `
            $env:MEETINGRELAY_NATIVE_FATAL_BOUNDARY_FIXTURE_EXE `
            $evidencePath `
            $env:MEETINGRELAY_SHERPA_RELEASE_CANDIDATE_EXECUTION_HOST_EXE `
            $schemaRegistry `
            $env:MEETINGRELAY_SHERPA_MODEL `
            $env:MEETINGRELAY_SHERPA_TOKENS `
            $env:SHERPA_ONNX_LIB_DIR `
            $env:MEETINGRELAY_SHERPA_LOCK `
            $packageLock `
            $env:MEETINGRELAY_SHERPA_WAV)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "actual native candidate fatal-process evidence run failed" }
          $marker = @($output | Where-Object {
            [string]$_ -match '^candidate-native-fault-evidence=verified evidence_sha256=[0-9a-f]{64} locked_input_snapshot_sha256=[0-9a-f]{64} lanes=3 formal_claims=none production_evidence=false$'
          })
          if ($marker.Count -ne 1) {
            throw "actual native candidate fault-evidence marker is missing or duplicated"
          }

          $validation = @(& pnpm phase0:sherpa-candidate-fault-evidence:validate $evidencePath)
          $validation | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "persisted native candidate fault evidence failed strict validation" }
          $validationMarker = @($validation | Where-Object {
            [string]$_ -match '^candidate-native-fault-evidence-file=verified evidence_sha256=[0-9a-f]{64} locked_input_snapshot_sha256=[0-9a-f]{64} lanes=3 formal_claims=none production_evidence=false$'
          })
          if ($validationMarker.Count -ne 1) {
            throw "persisted native candidate fault-evidence validation marker is missing or duplicated"
          }
          if (@(git status --porcelain=v1 -- Cargo.lock).Count -ne 0) {
            throw "native fatal-process evidence changed Cargo.lock"
          }
        timeout-minutes: 15

      - name: Clean native fatal-process build and evidence state
        if: always()
        shell: pwsh
        run: |
          $repositoryTargetRoot = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE 'target'))
          $targetPrefix = $repositoryTargetRoot.TrimEnd([IO.Path]::DirectorySeparatorChar) + [IO.Path]::DirectorySeparatorChar
          $fatalFixtureRoot = [IO.Path]::GetFullPath((Join-Path $repositoryTargetRoot 'sherpa-native/fatal-fixtures'))
          $evidencePath = [IO.Path]::GetFullPath((Join-Path $repositoryTargetRoot 'sherpa-native/native-candidate-fault-evidence.json'))
          $evidenceParent = Split-Path -Parent $evidencePath
          $stagingCandidates = @(
            Get-ChildItem -LiteralPath $evidenceParent -Force -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -cmatch '^\.native-candidate-fault-evidence\.json\.[0-9a-f]{32}\.staging$' } |
              ForEach-Object { [IO.Path]::GetFullPath($_.FullName) }
          )
          foreach ($candidate in @($fatalFixtureRoot, $evidencePath) + $stagingCandidates) {
            if (-not $candidate.StartsWith($targetPrefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw "native fatal-process cleanup target escaped the repository target directory"
            }
            $current = $candidate
            while ($true) {
              if (Test-Path -LiteralPath $current) {
                $attributes = [IO.File]::GetAttributes($current)
                if (($attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                  throw "native fatal-process cleanup path contains a reparse point: $current"
                }
              }
              if ($current.Equals($repositoryTargetRoot, [StringComparison]::OrdinalIgnoreCase)) { break }
              $parent = [IO.Directory]::GetParent($current)
              if ($null -eq $parent) { throw "native fatal-process cleanup path did not reach the repository target root" }
              $current = $parent.FullName
            }
            if (Test-Path -LiteralPath $candidate) {
              Remove-Item -LiteralPath $candidate -Recurse -Force
            }
            if (Test-Path -LiteralPath $candidate) {
              throw "native fatal-process cleanup left state behind: $candidate"
            }
          }
        timeout-minutes: 5

      - name: Test WP-0.4 sherpa candidate-input materializer
        run: pnpm phase0:sherpa-candidate-materializer:test
        timeout-minutes: 5

      - name: Typecheck desktop frontend
        run: pnpm desktop:typecheck
        timeout-minutes: 10

      - name: Build desktop frontend
        run: pnpm desktop:build
        timeout-minutes: 10

      - name: Build release desktop shell
        run: pnpm --dir apps/desktop run tauri:build:ci
        timeout-minutes: 20
