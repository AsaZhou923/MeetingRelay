          )
          $forbiddenEnvironment = @(
            'AR', 'CARGO_BUILD_TARGET', 'CARGO_ENCODED_RUSTFLAGS', 'CARGO_HOME',
            'CARGO_INCREMENTAL', 'CARGO_NET_OFFLINE', 'CARGO_TARGET_DIR', 'CC',
            'CFLAGS', 'CL', 'CXXFLAGS', 'GIT_CONFIG_COUNT', 'GIT_CONFIG_GLOBAL',
            'GIT_CONFIG_NOSYSTEM', 'GIT_CONFIG_SYSTEM', 'GIT_DIR', 'GIT_WORK_TREE',
            'LDFLAGS', 'LINK', 'RUSTC', 'RUSTC_BOOTSTRAP', 'RUSTC_WRAPPER',
            'RUSTC_WORKSPACE_WRAPPER', 'RUSTDOCFLAGS', 'RUSTFLAGS', 'RUSTUP_HOME',
            'RUSTUP_TOOLCHAIN', 'SHERPA_ONNX_LIB_DIR', '_CL_'
          )
          foreach ($entry in @(Get-ChildItem Env:)) {
            $upper = $entry.Name.ToUpperInvariant()
            if ($forbiddenEnvironment -contains $upper -or
                $upper.StartsWith('CARGO_PROFILE_', [StringComparison]::Ordinal) -or
                $upper -match '^CARGO_TARGET_.*_(?:LINKER|RUNNER|RUSTFLAGS)$' -or
                $upper -match '^(?:AR|CC|CFLAGS|CXXFLAGS|LDFLAGS)_') {
              Remove-Item -LiteralPath "Env:$($entry.Name)"
            }
          }
          $output = @(& node ./tools/sherpa-native/quality-host-source-build-attestor.mjs --attest $inputPath)
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) { throw "quality-host source-build attestation failed" }
          $attestationSha256 = (Get-FileHash -LiteralPath $attestationPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $marker = @($output | Where-Object {
            [string]$_ -ceq "QUALITY_HOST_SOURCE_BUILD_ATTESTATION=PASS attestation_sha256=$attestationSha256 execution_status=not-run formal_claims=none production_evidence=false"
          })
          if ($marker.Count -ne 1) {
            throw "quality-host source-build attestation marker is missing or duplicated"
          }
          $attestation = Get-Content -LiteralPath $attestationPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $formalQualityHost = [IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE "target/sherpa-native/formal-run-trust/quality-host-builds/$($env:GITHUB_SHA)/release/meetingrelay-sherpa-candidate-quality-host.exe"))
