name: WP-0.2 Bootstrap CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    name: Windows bootstrap
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        timeout-minutes: 10

      - name: Test desktop bootstrap contract
        run: pnpm --dir apps/desktop test
        timeout-minutes: 5

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        timeout-minutes: 5

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
        timeout-minutes: 15

      - name: Check Rust workspace
        run: cargo check --workspace --all-targets --all-features --locked
        timeout-minutes: 15

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets --all-features --locked
        timeout-minutes: 15

      - name: Test Rust workspace in release mode
        run: cargo test --workspace --release --all-targets --all-features --locked
        timeout-minutes: 20

      - name: Typecheck desktop frontend
        run: pnpm desktop:typecheck
        timeout-minutes: 10

      - name: Build desktop frontend
        run: pnpm desktop:build
        timeout-minutes: 10

      - name: Build release desktop shell
        run: pnpm --dir apps/desktop tauri build --no-bundle
        timeout-minutes: 20
